<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quản lý Danh sách Đảng viên Chi bộ</title>
<style>
  :root{
    --primary:#7a1f1f;
    --primary-dark:#5a1414;
    --bg:#f4f1ec;
    --card:#ffffff;
    --border:#ddd6ca;
    --text:#2b2b2b;
    --muted:#7a746a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:var(--primary);
    color:#fff;
    padding:22px 20px 24px;
    text-align:center;
    box-shadow:0 4px 14px rgba(0,0,0,.15);
  }
  header h1{margin:0;font-size:19px;letter-spacing:.5px;}
  header .sub{font-size:12px;opacity:.85;margin-top:4px;}
  .container{max-width:1100px;margin:24px auto;padding:0 16px;}
  .card{
    background:var(--card);
    border:none;
    border-radius:16px;
    padding:22px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
  }
  .hidden{display:none !important;}

  /* Login */
  .tabs{display:flex;gap:8px;margin-bottom:18px;background:#efe9df;padding:5px;border-radius:14px;}
  .tab-btn{
    flex:1;padding:11px;border:none;background:transparent;
    border-radius:10px;cursor:pointer;font-weight:600;color:var(--muted);
    transition:background .15s ease, color .15s ease;
  }
  .tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;}
  .field input,.field select{
    width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;
  }
  .password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  .password-wrapper input {
    flex: 1;
    padding-right: 45px;
  }
  .toggle-password {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    padding: 0 5px;
  }
  .btn{
    padding:13px 18px;border:none;border-radius:14px;cursor:pointer;font-weight:600;font-size:14.5px;
    min-height:46px;-webkit-tap-highlight-color:transparent;
    transition:transform .08s ease, opacity .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(.97);opacity:.85;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-secondary{background:#eef0ef;color:#333;}
  .btn-secondary:hover{background:#e2e5e3;}
  .btn-danger{background:#a33;color:#fff;}
  .btn-logout{background:#ffe1ea;color:#c2185b;}
  .btn-logout:hover{background:#ffd0de;}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .msg{font-size:13px;margin-top:10px;padding:8px 10px;border-radius:6px;}
  .msg.error{background:#fdeaea;color:#a33;}
  .msg.success{background:#eaf7ea;color:#2a7a2a;}

  /* Main app */
  .topbar{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:20px;}
  .topbar .who{font-size:13.5px;color:var(--muted);text-align:center;}
  .actions{display:flex;justify-content:center;gap:10px;width:100%;max-width:420px;flex-wrap:wrap;}
  .actions .btn{flex:1 1 150px;max-width:200px;text-align:center;}
  .logout-btn{width:100%;max-width:220px;}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;}
  th,td{border:1px solid var(--border);padding:8px 10px;text-align:left;}
  th{background:#efe9df;position:sticky;top:0;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:#f7f3ec;}
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
  .search-box{padding:9px 12px;border:1px solid var(--border);border-radius:6px;min-width:220px;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;
  }
  .modal{
    background:#fff;border-radius:10px;max-width:640px;width:100%;
    max-height:88vh;overflow-y:auto;padding:22px;
  }
  .modal h2{margin-top:0;font-size:17px;color:var(--primary);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  @media (max-width:560px){.grid2{grid-template-columns:1fr;}}
  footer{text-align:center;color:var(--muted);font-size:12px;margin:30px 0;}
</style>
</head>
<body>

<header>
  <h1>DANH SÁCH ĐẢNG VIÊN CHI BỘ</h1>
  <div class="sub">Hệ thống quản lý &amp; chỉnh sửa thông tin đảng viên</div>
</header>

<div class="container">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen" class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabMemberBtn" onclick="switchTab('member')">Đảng viên</button>
      <button class="tab-btn" id="tabAdminBtn" onclick="switchTab('admin')">Quản trị (Admin)</button>
    </div>

    <!-- Member login -->
    <div id="memberLoginForm">
      <div class="field">
        <label>Số CCCD</label>
        <input type="text" id="memberCccdInput" placeholder="Nhập số CCCD" autocomplete="off" />
      </div>
      <div class="field hidden" id="memberPasswordField">
        <label>Mật khẩu</label>
        <div class="password-wrapper">
          <input type="password" id="memberPasswordInput" placeholder="Nhập mật khẩu" />
          <button type="button" class="toggle-password" onclick="togglePassword('memberPasswordInput', this)">👁️</button>
        </div>
      </div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" onclick="doMemberLogin()">Đăng nhập</button>
      </div>
      <div id="memberLoginMsg"></div>
    </div>

    <!-- Admin login -->
    <div id="adminLoginForm" class="hidden">
      <div class="field">
        <label>Mật khẩu quản trị</label>
        <div class="password-wrapper">
          <input type="password" id="adminPasswordInput" placeholder="Nhập mật khẩu admin" />
          <button type="button" class="toggle-password" onclick="togglePassword('adminPasswordInput', this)">👁️</button>
        </div>
      </div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" onclick="doAdminLogin()">Đăng nhập</button>
      </div>
      <div id="adminLoginMsg"></div>
    </div>
  </div>

  <!-- ============ MAIN SCREEN ============ -->
  <div id="mainScreen" class="hidden">
    <div class="topbar">
      <div class="who" id="whoAmI"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="addMemberBtn" onclick="openAddModal()" style="display:none;">+ Thêm đảng viên</button>
        <button class="btn btn-secondary" onclick="openChangePasswordModal()">Đổi mật khẩu</button>
      </div>
      <button class="btn btn-logout logout-btn" onclick="doLogout()">Đăng xuất</button>
    </div>


    <div class="card">
      <div style="margin-bottom:12px;" id="searchBar" class="hidden">
        <input type="text" class="search-box" id="searchInput" placeholder="Tìm theo họ tên hoặc số CCCD..." oninput="renderTable()" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Họ và tên</th>
              <th>Ngày sinh</th>
              <th>Ngày vào đảng</th>
              <th>Số CCCD</th>
              <th>Số điện thoại</th>
              <th>Địa chỉ thường trú</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<footer>Quản lý danh sách đảng viên · Dữ liệu lưu trên Google Sheet</footer>

<!-- ============ EDIT MEMBER MODAL ============ -->
<div class="modal-overlay hidden" id="editModalOverlay">
  <div class="modal">
    <h2 id="editModalTitle">Thông tin đảng viên</h2>
    <div class="grid2" id="editFormFields"></div>
    <div id="editModalMsg"></div>
    <div class="btn-row">
      <button class="btn btn-danger hidden" id="deleteBtn" onclick="deleteCurrentMember()">Xoá</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveEditModal()">Lưu</button>
    </div>
  </div>
</div>

<!-- ============ CHANGE PASSWORD MODAL ============ -->
<div class="modal-overlay hidden" id="pwModalOverlay">
  <div class="modal" style="max-width:420px;">
    <h2>Đổi mật khẩu</h2>
    <div class="field">
      <label>Mật khẩu hiện tại</label>
      <div class="password-wrapper">
        <input type="password" id="pwOld" />
        <button type="button" class="toggle-password" onclick="togglePassword('pwOld', this)">👁️</button>
      </div>
    </div>
    <div class="field">
      <label>Mật khẩu mới</label>
      <div class="password-wrapper">
        <input type="password" id="pwNew" />
        <button type="button" class="toggle-password" onclick="togglePassword('pwNew', this)">👁️</button>
      </div>
    </div>
    <div class="field">
      <label>Nhập lại mật khẩu mới</label>
      <div class="password-wrapper">
        <input type="password" id="pwNewConfirm" />
        <button type="button" class="toggle-password" onclick="togglePassword('pwNewConfirm', this)">👁️</button>
      </div>
    </div>
    <div id="pwModalMsg"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePwModal()">Hủy</button>
      <button class="btn btn-primary" onclick="submitChangePassword()">Lưu</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   CẤU HÌNH: KHÔNG dán link Apps Script trực tiếp ở đây nữa.
   Link Apps Script được giấu trong biến môi trường ở server
   (Vercel) và gọi qua /api/proxy để tránh lộ link ra ngoài.
   ========================================================= */
const API_URL = "/api/proxy";

// Danh sách các trường hiển thị trong form chỉnh sửa (khớp với Code.gs, trừ STT và MatKhau)
const FIELDS = [
  { key: "Họ và tên", type: "text" },
  { key: "Ngày tháng năm sinh", type: "text", placeholder: "vd: 15/03/1985" },
  { key: "Ngày vào đảng", type: "text", placeholder: "vd: 20/10/2015" },
  { key: "Ngày chính thức", type: "text", placeholder: "vd: 20/10/2016" },
  { key: "Dân tộc", type: "text" },
  { key: "Tôn giáo", type: "text" },
  { key: "Số CCCD", type: "text" },
  { key: "Số thẻ đảng viên (X)", type: "text" },
  { key: "Học vấn", type: "text", placeholder: "vd: 12/12" },
  { key: "Chuyên môn", type: "text" },
  { key: "LLCT", type: "text" },
  { key: "Số điện thoại", type: "text" },
  { key: "Chi bộ cũ trước khi sắp xếp", type: "text" },
  { key: "Ghi chú (MSH X)", type: "text" },
  { key: "Địa chỉ nơi thường trú", type: "text" }
];

let session = { role: null, cccd: null, password: null, adminPassword: null };
let members = [];       // dữ liệu hiển thị (admin: tất cả, member: 1 dòng)
let currentEdit = null; // record đang mở trong modal
let isAddMode = false;

// Hàm toggle hiển thị mật khẩu
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "🙈";
  } else {
    input.type = "password";
    btn.textContent = "👁️";
  }
}

// Hàm toggle cho mật khẩu trong form admin (sử dụng element truyền trực tiếp)
function togglePasswordDirect(inputEl, btn) {
  if (!inputEl) return;
  if (inputEl.type === "password") {
    inputEl.type = "text";
    btn.textContent = "🙈";
  } else {
    inputEl.type = "password";
    btn.textContent = "👁️";
  }
}

/* ---------- gọi API ---------- */
async function apiCall(action, data) {
  const body = Object.assign({ action }, data || {});
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" }, // gọi /api/proxy cùng domain, không cần né CORS
    body: JSON.stringify(body)
  });
  return res.json();
}

/* ---------- tabs ---------- */
function switchTab(tab) {
  document.getElementById("tabMemberBtn").classList.toggle("active", tab === "member");
  document.getElementById("tabAdminBtn").classList.toggle("active", tab === "admin");
  document.getElementById("memberLoginForm").classList.toggle("hidden", tab !== "member");
  document.getElementById("adminLoginForm").classList.toggle("hidden", tab !== "admin");
}

function showMsg(elId, message, isError) {
  const el = document.getElementById(elId);
  el.innerHTML = message ? `<div class="msg ${isError ? "error" : "success"}">${message}</div>` : "";
}

/* ---------- đăng nhập đảng viên ---------- */
async function doMemberLogin() {
  const cccd = document.getElementById("memberCccdInput").value.trim();
  const password = document.getElementById("memberPasswordInput").value;
  if (!cccd) { showMsg("memberLoginMsg", "Vui lòng nhập số CCCD.", true); return; }

  showMsg("memberLoginMsg", "Đang xử lý...", false);
  try {
    const result = await apiCall("memberLogin", { cccd, password });
    if (result.success) {
      session = { role: "member", cccd, password: password || cccd };
      members = [result.data];
      showMsg("memberLoginMsg", "");
      enterMainScreen();
    } else if (result.requirePassword) {
      document.getElementById("memberPasswordField").classList.remove("hidden");
      showMsg("memberLoginMsg", result.message, true);
    } else {
      showMsg("memberLoginMsg", result.message || "Đăng nhập thất bại.", true);
    }
  } catch (err) {
    showMsg("memberLoginMsg", "Lỗi kết nối: " + err.message, true);
  }
}

/* ---------- đăng nhập admin ---------- */
async function doAdminLogin() {
  const password = document.getElementById("adminPasswordInput").value;
  showMsg("adminLoginMsg", "Đang xử lý...", false);
  try {
    const result = await apiCall("adminLogin", { password });
    if (result.success) {
      session = { role: "admin", adminPassword: password };
      showMsg("adminLoginMsg", "");
      await loadAllMembers();
      enterMainScreen();
    } else {
      showMsg("adminLoginMsg", result.message || "Sai mật khẩu.", true);
    }
  } catch (err) {
    showMsg("adminLoginMsg", "Lỗi kết nối: " + err.message, true);
  }
}

async function loadAllMembers() {
  const result = await apiCall("getAllMembers", { adminPassword: session.adminPassword });
  if (result.success) members = result.data;
}

/* ---------- màn hình chính ---------- */
function enterMainScreen() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("mainScreen").classList.remove("hidden");
  document.getElementById("whoAmI").textContent =
    session.role === "admin" ? "Đăng nhập với vai trò: Quản trị viên" : "Đăng nhập với vai trò: Đảng viên (CCCD: " + session.cccd + ")";
  document.getElementById("addMemberBtn").style.display = session.role === "admin" ? "inline-block" : "none";
  document.getElementById("searchBar").classList.toggle("hidden", session.role !== "admin");
  renderTable();
}

function doLogout() {
  session = { role: null, cccd: null, password: null, adminPassword: null };
  members = [];
  document.getElementById("mainScreen").classList.add("hidden");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("memberPasswordField").classList.add("hidden");
  document.getElementById("memberPasswordInput").value = "";
  document.getElementById("memberCccdInput").value = "";
  document.getElementById("adminPasswordInput").value = "";
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  const search = (document.getElementById("searchInput")?.value || "").toLowerCase();
  members
    .filter(m => {
      if (session.role !== "admin" || !search) return true;
      return (String(m["Họ và tên"]).toLowerCase().includes(search) ||
              String(m["Số CCCD"]).toLowerCase().includes(search));
    })
    .forEach((m, idx) => {
      const tr = document.createElement("tr");
      tr.onclick = () => openEditModal(m);
      tr.innerHTML = `
        <td>${m["STT"] ?? (idx + 1)}</td>
        <td>${m["Họ và tên"] || ""}</td>
        <td>${m["Ngày tháng năm sinh"] || ""}</td>
        <td>${m["Ngày vào đảng"] || ""}</td>
        <td>${m["Số CCCD"] || ""}</td>
        <td>${m["Số điện thoại"] || ""}</td>
        <td>${m["Địa chỉ nơi thường trú"] || ""}</td>
      `;
      tbody.appendChild(tr);
    });
}

/* ---------- modal chỉnh sửa ---------- */
function buildEditForm(record) {
  const container = document.getElementById("editFormFields");
  container.innerHTML = "";
  
  // Thêm trường mật khẩu nếu là admin
  const allFields = [...FIELDS];
  if (session.role === "admin") {
    allFields.push({ key: "Mật khẩu", type: "password" });
  }
  
  allFields.forEach(f => {
    const wrap = document.createElement("div");
    wrap.className = "field";
    
    let disabled = "";
    if (f.key === "Số CCCD" && session.role !== "admin" && !isAddMode) {
      disabled = "disabled";
    }
    
    // Lấy giá trị
    let value = "";
    if (record && record[f.key] !== undefined) {
      value = record[f.key];
    } else if (record && f.key === "Mật khẩu" && record["MatKhau"] !== undefined) {
      value = record["MatKhau"];
    }
    
    let inputHtml = '';
    if (f.key === "Mật khẩu" && session.role === "admin") {
      // Hiển thị trường mật khẩu cho admin
      const passValue = value || "";
      // Tạo unique id cho input
      const inputId = 'pass_' + Math.random().toString(36).substr(2, 9);
      inputHtml = `
        <div class="password-wrapper">
          <input type="password" id="${inputId}" data-key="Mật khẩu" value="${passValue}" 
                 placeholder="Nhập mật khẩu mới (để trống nếu không đổi)" />
          <button type="button" class="toggle-password" onclick="togglePassword('${inputId}', this)">👁️</button>
        </div>
        ${(!isAddMode && record && record["Số CCCD"]) ? `
        <button type="button" class="btn btn-danger" style="margin-top:8px;width:100%;"
                onclick="resetMemberPassword('${String(record["Số CCCD"]).replace(/'/g, "\\'")}')">
          🗑️ Xoá mật khẩu (đặt lại mặc định = CCCD)
        </button>` : ``}
      `;
    } else {
      // Xử lý đặc biệt cho Học vấn - đảm bảo hiển thị đúng định dạng
      let displayValue = value || "";
      // Nếu value là đối tượng Date, chuyển thành chuỗi
      if (typeof displayValue === 'object' && displayValue instanceof Date) {
        displayValue = formatDate(displayValue);
      }
      inputHtml = `
        <input type="text" data-key="${f.key}" value="${displayValue}"
               placeholder="${f.placeholder || ""}" ${disabled} />
      `;
    }
    
    wrap.innerHTML = `
      <label>${f.key}</label>
      ${inputHtml}
    `;
    container.appendChild(wrap);
  });
}

// Hàm format date để hiển thị đúng
function formatDate(date) {
  if (!date) return '';
  const d = new Date(date);
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

function openEditModal(record) {
  isAddMode = false;
  currentEdit = record;
  document.getElementById("editModalTitle").textContent = "Chỉnh sửa thông tin đảng viên";
  document.getElementById("deleteBtn").classList.toggle("hidden", session.role !== "admin");
  buildEditForm(record);
  showMsg("editModalMsg", "");
  document.getElementById("editModalOverlay").classList.remove("hidden");
}

function openAddModal() {
  isAddMode = true;
  currentEdit = null;
  document.getElementById("editModalTitle").textContent = "Thêm đảng viên mới";
  document.getElementById("deleteBtn").classList.add("hidden");
  buildEditForm({});
  showMsg("editModalMsg", "");
  document.getElementById("editModalOverlay").classList.remove("hidden");
}

function closeEditModal() {
  document.getElementById("editModalOverlay").classList.add("hidden");
  currentEdit = null;
  isAddMode = false;
}

function collectFormRecord() {
  const inputs = document.querySelectorAll("#editFormFields input");
  const record = {};
  inputs.forEach(inp => { 
    const key = inp.dataset.key;
    if (key) {
      record[key] = inp.value;
    }
  });
  return record;
}

async function saveEditModal() {
  const record = collectFormRecord();
  showMsg("editModalMsg", "Đang lưu...", false);
  try {
    let result;
    
    // Nếu là admin và có trường mật khẩu
    if (session.role === "admin" && record["Mật khẩu"] !== undefined) {
      // Nếu mật khẩu không rỗng thì cập nhật
      if (record["Mật khẩu"].trim() !== "") {
        // Gọi API đổi mật khẩu riêng
        const cccd = currentEdit ? currentEdit["Số CCCD"] : record["Số CCCD"];
        const passResult = await apiCall("adminChangeMemberPassword", {
          adminPassword: session.adminPassword,
          cccd: cccd,
          newPassword: record["Mật khẩu"]
        });
        if (!passResult.success) {
          showMsg("editModalMsg", passResult.message || "Lỗi cập nhật mật khẩu.", true);
          return;
        }
      }
      delete record["Mật khẩu"]; // Xóa trường mật khẩu trước khi cập nhật thông tin
    }
    
    if (isAddMode) {
      result = await apiCall("adminAddMember", { adminPassword: session.adminPassword, record });
    } else if (session.role === "admin") {
      result = await apiCall("adminUpdateMember", {
        adminPassword: session.adminPassword,
        rowIndex: currentEdit["__rowIndex"],
        record
      });
    } else {
      result = await apiCall("updateMember", {
        cccd: session.cccd,
        password: session.password,
        record
      });
    }

    if (result.success) {
      if (session.role === "admin") {
        await loadAllMembers();
      } else {
        members = [result.data];
      }
      renderTable();
      closeEditModal();
    } else {
      showMsg("editModalMsg", result.message || "Có lỗi xảy ra.", true);
    }
  } catch (err) {
    showMsg("editModalMsg", "Lỗi kết nối: " + err.message, true);
  }
}

async function resetMemberPassword(cccd) {
  if (!cccd) return;
  if (session.role !== "admin") return;
  if (!confirm("Xoá mật khẩu của đảng viên này? Đảng viên sẽ đăng nhập lại chỉ bằng số CCCD, không cần mật khẩu.")) return;
  showMsg("editModalMsg", "Đang xoá mật khẩu...", false);
  try {
    const result = await apiCall("adminResetMemberPassword", {
      adminPassword: session.adminPassword,
      cccd
    });
    if (result.success) {
      showMsg("editModalMsg", result.message || "Đã xoá mật khẩu thành công.", false);
      // Cập nhật lại dữ liệu để ô mật khẩu trong form không còn hiển thị mật khẩu cũ
      if (currentEdit) currentEdit["MatKhau"] = "";
      buildEditForm(currentEdit || {});
    } else {
      showMsg("editModalMsg", result.message || "Có lỗi xảy ra.", true);
    }
  } catch (err) {
    showMsg("editModalMsg", "Lỗi kết nối: " + err.message, true);
  }
}

async function deleteCurrentMember() {
  if (!currentEdit || session.role !== "admin") return;
  if (!confirm("Bạn có chắc muốn xoá đảng viên này khỏi danh sách?")) return;
  showMsg("editModalMsg", "Đang xoá...", false);
  try {
    const result = await apiCall("adminDeleteMember", {
      adminPassword: session.adminPassword,
      rowIndex: currentEdit["__rowIndex"]
    });
    if (result.success) {
      await loadAllMembers();
      renderTable();
      closeEditModal();
    } else {
      showMsg("editModalMsg", result.message || "Có lỗi xảy ra.", true);
    }
  } catch (err) {
    showMsg("editModalMsg", "Lỗi kết nối: " + err.message, true);
  }
}

/* ---------- đổi mật khẩu ---------- */
function openChangePasswordModal() {
  document.getElementById("pwOld").value = "";
  document.getElementById("pwNew").value = "";
  document.getElementById("pwNewConfirm").value = "";
  showMsg("pwModalMsg", "");
  document.getElementById("pwModalOverlay").classList.remove("hidden");
}
function closePwModal() {
  document.getElementById("pwModalOverlay").classList.add("hidden");
}
async function submitChangePassword() {
  const oldPass = document.getElementById("pwOld").value;
  const newPass = document.getElementById("pwNew").value;
  const confirmPass = document.getElementById("pwNewConfirm").value;
  if (!newPass || newPass !== confirmPass) {
    showMsg("pwModalMsg", "Mật khẩu mới không khớp.", true);
    return;
  }
  if (newPass.length < 6) {
    showMsg("pwModalMsg", "Mật khẩu mới phải có ít nhất 6 ký tự.", true);
    return;
  }
  showMsg("pwModalMsg", "Đang xử lý...", false);
  try {
    let result;
    if (session.role === "admin") {
      result = await apiCall("changeAdminPassword", { oldPassword: oldPass, newPassword: newPass });
      if (result.success) session.adminPassword = newPass;
    } else {
      result = await apiCall("changeMemberPassword", { cccd: session.cccd, oldPassword: oldPass, newPassword: newPass });
      if (result.success) session.password = newPass;
    }
    if (result.success) {
      showMsg("pwModalMsg", result.message || "Đổi mật khẩu thành công.", false);
      setTimeout(closePwModal, 1200);
    } else {
      showMsg("pwModalMsg", result.message || "Có lỗi xảy ra.", true);
    }
  } catch (err) {
    showMsg("pwModalMsg", "Lỗi kết nối: " + err.message, true);
  }
}
</script>
